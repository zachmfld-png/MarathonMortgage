<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Mayfield / Marathon Mortgage</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      :root{--brand:#0b6b4f}
      html,body{height:100%}
      body{font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial;margin:0;color:#0f172a}
      .card-shadow{box-shadow:0 6px 20px rgba(11,107,79,0.12),0 2px 6px rgba(11,107,79,0.06)}
      .logo{height:48px}
      a:focus{outline:2px solid rgba(11,107,79,0.14);outline-offset:2px}
    </style>
  </head>
  <body class="bg-gray-50 min-h-screen flex items-center justify-center p-6">
    <main class="max-w-4xl w-full bg-white rounded-2xl p-8 card-shadow">
      <header class="flex items-center justify-between mb-6">
        <div class="flex items-center gap-4">
          <img id="brandLogo" src="brand_assets/MarathonMortgageLogo.png" alt="Mayfield / Marathon Mortgage" class="logo object-contain" onerror="this.onerror=null;this.src='https://placehold.co/120x48?text=Logo'">
          <div>
            <h1 class="text-2xl font-semibold" style="color:var(--brand)">Mayfield Mortgage</h1>
            <p class="text-sm text-gray-500">Home lending simplified</p>
          </div>
        </div>
        <nav>
          <a href="#contact" class="text-sm px-3 py-2 rounded hover:bg-gray-100 focus-visible:ring-2 focus-visible:ring-offset-2 focus-visible:ring-[var(--brand)]">Contact</a>
        </nav>
      </header>

      <section class="grid md:grid-cols-2 gap-6 items-center">
        <div>
          <h2 class="text-3xl md:text-4xl font-extrabold leading-tight mb-4">Find the right mortgage for your home</h2>
          <p class="text-gray-600 mb-6">Easy rates, clear guidance, and trusted service to help you buy or refinance.</p>
          <div class="flex gap-3">
            <a href="#contact" class="inline-block px-5 py-3 rounded-lg text-white" style="background:var(--brand);box-shadow:0 6px 20px rgba(11,107,79,0.18);">Get Started</a>
            <a href="#" class="inline-block px-5 py-3 rounded-lg border border-gray-200 text-gray-700 hover:bg-gray-50">Learn More</a>
          </div>
        </div>
        <div>
          <div class="bg-gray-100 rounded-lg p-4">
            <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&q=80&w=600" alt="Forested mountain" class="w-full h-auto rounded-md object-cover">
          </div>
        </div>
      </section>

      <footer class="mt-8 text-center text-xs text-gray-500">© <span id="year"></span> Mayfield Mortgage</footer>
    </main>
    <script>document.getElementById('year').textContent=new Date().getFullYear();</script>
  </body>
</html>
